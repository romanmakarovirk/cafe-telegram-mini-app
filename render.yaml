databases:
  - name: cafe-db
    plan: free
    databaseName: cafe_app

services:
  - type: web
    name: cafe-telegram-mini-app
    runtime: docker
    plan: free
    healthCheckPath: /readyz
    envVars:
      # ── Auto-injected by Render ──
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-db
          property: connectionString

      # ── Public config (safe to store in YAML) ──
      - key: APP_BASE_URL
        value: https://cafe-telegram-mini-app.onrender.com
      - key: WEBAPP_URL
        value: https://cafe-telegram-mini-app.onrender.com
      - key: DEV_MODE
        value: "false"

      # ── Secrets (MUST set in Render Dashboard, never in code) ──
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: ALLOWED_ADMIN_IDS
        sync: false
      - key: KITCHEN_API_KEY
        sync: false

      # ── YooKassa (payment + auto-fiscalization) ──
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: YOOKASSA_TEST_MODE
        value: "true"
      - key: YOOKASSA_RETURN_URL
        sync: false
      - key: COMPANY_INN
        sync: false
      - key: COMPANY_EMAIL
        sync: false
      - key: COMPANY_SNO
        value: "usn_income"

      # ── 1C:Fresh OData (accounting) ──
      - key: FRESH_BASE_URL
        sync: false
      - key: FRESH_USERNAME
        sync: false
      - key: FRESH_PASSWORD
        sync: false
      - key: FRESH_ENABLED
        value: "false"
