databases:
  - name: cafe-db
    plan: free
    databaseName: cafe_app

services:
  - type: web
    name: cafe-telegram-mini-app
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cafe-db
          property: connectionString
      - key: APP_BASE_URL
        value: https://cafe-telegram-mini-app.onrender.com
      - key: WEBAPP_URL
        value: https://cafe-telegram-mini-app.onrender.com
